<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>wikistlist</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/card.css">

</head>

<body>

    <div id="app">

        <aside id="sidebar">

            <button id="saveImage">
                이미지 저장
            </button>

<hr>

            <hr>

            <div class="section">

                <label>분류</label>
                <input id="category" placeholder="장르/분류">

                <label>편집할 카드</label>

                <select id="selectedCard">

                    <option value="0">왼쪽 카드</option>
                    <option value="1">오른쪽 카드</option>

                </select>

            </div>

            <hr>

            <div class="section">

                <label>한글 이름</label>
                <input id="nameKR">

                <label>한문 이름</label>
                <input id="nameJP">

                <label>영문 이름</label>
                <input id="nameEN">

                <label>헤더 색상</label>
                <input type="color" id="headerColor">

            </div>

            <hr>

            <div class="section">

                <label>이미지</label>

                <input type="file" id="imageInput" accept="image/*">

                <label>확대</label>
                <input type="range" id="imageScale" min="50" max="300" value="100">

                <label>좌우 이동</label>
                <input type="range" id="imageOffsetX" min="0" max="100" value="50">

                <label>상하 이동</label>
                <input type="range" id="imageOffsetY" min="0" max="100" value="50">

            </div>

            <hr>

            <div class="section">

                <h3>프로필 표</h3>

                <div id="rowEditor"></div>

                <button id="addRow">
                    행 추가
                </button>

            </div>

        </aside>

        <main id="preview">

            <div id="categoryPreview"></div>

            <div id="cardContainer"></div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script src="js/profile.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
