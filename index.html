<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>wikistlist</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/preview.css">
    <link rel="stylesheet" href="css/card.css">

</head>

<body>

    <div id="noticeModal">

        <div class="noticeBox">

            <h2>주의사항</h2>

            <p>
                • 자유롭게 수정, 변형해서 사용하셔도 좋습니다.<br>
                • 자작 발언 및 재배포 금지<br>
                • PC 최적화. 모바일 가능은 한데 불친절합니다(...)<br>
                  - 모바일 저장 시 팝업창 허용 필수
                • 사용불가 : <b>은혼 히지미츠 관련 드림</b>
            </p>

            <button id="noticeClose">
                확인
            </button>

        </div>

    </div>

    <div id="app">
        <div id="sidebarToggle">&lt;</div>
        <aside id="sidebar">
            <button id="saveImage">
                이미지 저장
            </button>

            <div class="section">

                <label>분류</label>
                <input id="category" placeholder="장르/분류">

                <p></p>

                <label>이미지 비율</label>

                <div class="cardSelect">

                    <label-a>
                        <input type="radio" name="imageShape" value="rectangle" checked>
                        직사각형
                    </label-a>


                    <label-a>
                        <input type="radio" name="imageShape" value="square">
                        정사각형
                    </label-a>

                </div>

                <p></p>

                <label>편집할 프로필</label>
                <div class="cardSelect">
                    <label-a>
                        <input type="radio" name="selectedCard" value="0" checked> 프로필 1
                    </label-a>

                    <label-a>
                        <input type="radio" name="selectedCard" value="1"> 프로필 2
                    </label-a>

                </div>

            </div>

            <br>

            <div class="section">

                <label>헤더 색상</label>
                <input type="color" id="headerColor">

                <label>한글 이름</label>
                <input id="nameKR">

                <label>한문 이름</label>
                <input id="nameJP">

                <label>영문 이름</label>
                <input id="nameEN">

            </div>

            <br>

            <div class="section">

                <label>이미지</label>

                <input type="file" id="imageInput" accept="image/*">

                <div class="imageEditor">

                    <label>확대</label>
                    <input type="range" id="imageScale" min="50" max="300" value="100">

                    <label>좌우 이동</label>
                    <input type="range" id="imageOffsetX" min="0" max="100" value="50">

                    <label>상하 이동</label>
                    <input type="range" id="imageOffsetY" min="0" max="100" value="50">

                </div>

            </div>

            <br>

            <div class="section">

                <label>프로필</label>

                <div id="rowEditor"></div>

                <button id="addRow">
                    행 추가
                </button>

            </div>

        </aside>

        <main id="preview">

            <div id="exportArea">

                <div id="categoryPreview"></div>

                <div id="cardContainer"></div>

            </div>

        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <script src="js/profile.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
